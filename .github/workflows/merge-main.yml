name: Merge to Main

on:
  push:
    branches: [main]

jobs:
  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nexafx
          POSTGRES_PASSWORD: nexafx_test
          POSTGRES_DB: nexafx_perf
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: nexafx
      DB_PASSWORD: nexafx_test
      DB_NAME: nexafx_perf
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'perf-test-jwt-secret' }}
      REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'perf-test-refresh-secret' }}
      DISABLE_BULL: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run migrations
        run: npm run migration:run || true
      - name: Run load tests
        run: npm run test:e2e -- --testPathPattern="transaction-load" --forceExit
        timeout-minutes: 10
        continue-on-error: true
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            test-results/
            coverage/
          retention-days: 30

  full-e2e:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nexafx
          POSTGRES_PASSWORD: nexafx_test
          POSTGRES_DB: nexafx_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: nexafx
      DB_PASSWORD: nexafx_test
      DB_NAME: nexafx_e2e
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'e2e-test-jwt-secret' }}
      REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'e2e-test-refresh-secret' }}
      DISABLE_BULL: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run migrations
        run: npm run migration:run || true
      - run: npm run test:e2e
        timeout-minutes: 10
